<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | RoomRadar</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='navbar.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <style>
        .alert-error {
            background: #fee2e2;
            color: #dc2626;
            border: 1px solid #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    {% include "_navbar.html" %}
    <section class="login-section">
        <div class="login-container">
            <div class="login-left">
                <h1>RoomRadar</h1>
                <p>Update your password and get back to finding the right stay.</p>
                <img src="https://cdn-icons-png.flaticon.com/512/1048/1048953.png" alt="reset-password-image">
            </div>

            <div class="login-right">
                <h2>Reset Password</h2>
                <p class="subtitle">Enter your account email and a new password</p>

                {% if error %}
                    <div class="alert-error">{{ error }}</div>
                {% endif %}

                <form action="{{ url_for('reset_password') }}" method="POST">
                    <div class="input-box">
                        <label>Email Address</label>
                        <input type="email" name="email" placeholder="Enter your email" required>
                    </div>
                    <div class="input-box">
                        <label>New Password</label>
                        <input type="password" name="password" placeholder="Create new password" required minlength="6">
                    </div>
                    <div class="input-box">
                        <label>Confirm Password</label>
                        <input type="password" name="confirm_password" placeholder="Confirm new password" required minlength="6">
                    </div>
                    <button type="submit">Update Password</button>
                </form>

                <div class="signup-link">
                    <a href="{{ url_for('login') }}">Back to Login</a>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
